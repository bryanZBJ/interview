name: Publish interview learning notes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test and build
        run: npm run check

      - name: Verify single safe artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test "$(find site -type f | wc -l | tr -d ' ')" = "1"
          bytes="$(wc -c < site/index.html | tr -d ' ')"
          if [ "$bytes" -ge 8388608 ]; then
            echo "warning: site/index.html is larger than 8 MB: $bytes bytes"
          fi
          if [ "$bytes" -gt 15728640 ]; then
            echo "site/index.html exceeds the 15 MB limit"
            exit 1
          fi
          if grep -Eq '/Users/zbj|Java后端项目经验梳理|jianli/|BEGIN (RSA|OPENSSH) PRIVATE KEY' site/index.html; then
            echo "site/index.html contains excluded or sensitive content"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
